<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>March Madness</title>

  <style>
    body {
      font-family: "Times New Roman", serif;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      width: 900px;
      margin: auto;
      border: 2px solid black;
    }

    .left {
      border-right: 2px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: bold;
      text-align: center;
    }

    .middle {
      border-right: 2px solid black;
      padding: 10px;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
    }

    .calendar div {
      padding: 5px;
    }

    .month {
      grid-column: 1 / span 7;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .calendar div:nth-child(n+18):nth-child(-n+33) {
      background: gold;
    }

    .right {
      padding: 20px;
      text-align: center;
    }

    .right h2 {
      margin-top: 0;
    }

    .return-container {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }
  </style>

</head>

<body>

  <div class="container">


    <div class="left">
      MARCH<br>MADNESS
    </div>


    <div class="middle">

      <div class="calendar">

        <div class="month">March</div>

        <div>Sun</div>
        <div>Mon</div>
        <div>Tue</div>
        <div>Wed</div>
        <div>Thu</div>
        <div>Fri</div>
        <div>Sat</div>

        <div></div>
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>

        <div>7</div>
        <div>8</div>
        <div>9</div>
        <div>10</div>
        <div>11</div>
        <div>12</div>
        <div>13</div>

        <div>14</div>
        <div>15</div>
        <div>16</div>
        <div>17</div>
        <div>18</div>
        <div>19</div>
        <div>20</div>

        <div>21</div>
        <div>22</div>
        <div>23</div>
        <div>24</div>
        <div>25</div>
        <div>26</div>
        <div>27</div>

        <div>28</div>
        <div>29</div>
        <div>30</div>
        <div>31</div>

      </div>

    </div>


    <div class="right">

      <h2>The Jayhawks</h2>

      <p>
        Hail to thee our alma mater,<br>
        towering toward the blue.<br>
        Lift the banner ever skyward,<br>
        Hail to old KU.
      </p>

    </div>

  </div>
  <br>
  <br>

  <div class="return-container">
    <a href="index.html">
      <button>Return to Main</button>
    </a>
  </div>

</body>

</html>
