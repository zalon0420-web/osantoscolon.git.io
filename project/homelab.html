<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Home</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background: url('https://zalon0420-web.github.io/images/coolbackgrounds-unsplash-zeller.jpg') no-repeat center center/cover;
    }

    /* OVERLAY */
    .overlay {
      background: rgba(0, 0, 0, 0.6);
      min-height: 100vh;
      padding: 40px 20px;
    }

    /* PROFILE */
    .profile img {
      width: 100px;
      border-radius: 50%;
    }

    .profile h1 {
      margin: 10px 0 0;
    }

    .profile p {
      color: #ccc;
    }

    /* BUTTONS */
    .buttons {
      margin: 25px 0;
    }

    .buttons button {
      margin: 5px;
      padding: 10px 18px;
      border-radius: 20px;
      border: 1px solid white;
      background: black;
      color: white;
      cursor: pointer;
    }

    .buttons button:hover {
      background: white;
      color: black;
    }

    /* NAV WINDOW */
    .window {
      max-width: 300px;
      margin: auto;
      background: rgba(0, 0, 0, 0.8);
      padding: 50px;
      border-radius: 200px;
      min-height: 300px;
    }

    /* LINKS INSIDE WINDOW */
    .window a {
      color: #ffffff;
      text-decoration: none;
    }

    .window a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="overlay">

    <!-- PROFILE -->
    <div class="profile">
      <img src="https://zalon0420-web.github.io/images/omar.gif">
      <h1>Omar SantosColón</h1>
      <p>Homepage</p>
    </div>

    <!-- NAV BUTTONS -->
    <div class="buttons">
      <button onclick="show('jobs')">Jobs</button>
      <button onclick="show('lab')">Lab</button>
      <button onclick="show('AI')">AI</button>
      <button onclick="show('tools')">Tools</button>
      <button onclick="show('external')">External</button>
    </div>

    <!-- NAV WINDOW -->
    <div class="window" id="content">

      <h2>Welcome</h2>
      <p>Select a section above.</p>

    </div>

  </div>

  <script>
    function show(section) {
      const content = document.getElementById("content");

      if (section === "jobs") {
        content.innerHTML = `
      <h2>Jobs Listing</h2>
      <p><a href="https://www.clearancejobs.com/login" target="_blank">Clearance Jobs</a></p>
      <p><a href="https://www.linkedin.com/feed/?trk=guest_homepage-basic_google-one-tap-submit" target="_blank">LinkedIn</a></p>
      <p><a href="https://www.indeed.com/" target="_blank">Indeed</a></p>
      <p><a href="https://www.usajobs.gov/" target="_blank">USAJobs</a></p>
      
    `;
      }

      if (section === "lab") {
        content.innerHTML = `
      <h2>Lab Systems</h2>
      <p><a href="https://10.10.8.139:8006/" target="_blank">Proxmox</a></p>
      <p><a href="http://10.10.8.30/admin/login" target="_blank">Pi-hole</a></p>
      <p><a href="http://10.10.8.239/ui/signin" target="_blank">Koi-Pond</a></p>
       <p><a href="https://10.10.8.1/#/login" target="_blank">OPAL</a></p>
    `;
      }


      if (section === "AI") {
        content.innerHTML = `
      <h2>AI</h2>
      <p><a href="https://chatgpt.com/?utm_source=google&utm_medium=paid_search&utm_campaign=GOOG_C_SEM_GBR_Core_CHT_BAU_ACQ_PER_MIX_ALL_NAMER_US_EN_091724&c_id=21714513245&c_agid=169187630042&c_crid=713941893301&c_kwid={keywordid}&c_ims=&c_pms=9005306&c_nw=g&c_dvc=c&gad_source=1&gad_campaignid=21714513245&gbraid=0AAAAA-I0E5c11MO99rZIsPSQGspnZTeu0&gclid=Cj0KCQiA18DMBhDeARIsABtYwT1STFmEeAnBdHLYrrRxbTznvXpafDjwWKujGxOqGAEdqSqZXugc0l0aAj9PEALw_wcB" target="_blank" >Chat GPT</a></p>
      <p><a href="https://copilot.microsoft.com/" target="_blank">Co-Pilot</a></p>
      <p><a href="https://chat.deepseek.com/" target="_blank">Deep Seek</a></p>
      `;
      }


      if (section === "tools") {
        content.innerHTML = `
      <h2>Tools</h2>
      <p><a href="va.html">VA Calculator</a></p>
      <p><a href="https://10.10.8.3:8446/" target="_blank">TAK Client</a></p>
      <p><a href="https://10.10.8.3:8443/" target="_blank">TAK Server</a></p>
    `;
      }

      if (section === "external") {
        content.innerHTML = `
      <h2>External</h2>
      <p><a href="https://www.google.com" target="_blank">Google</a></p>
    `;
      }
    }
  </script>

</body>

</html>
