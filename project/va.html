<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>VA Disability Calculator</title>
  <link rel="stylesheet" href="../CSS/reset.css">




  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
    }

    input {
      width: 80px;
      margin: 5px;
      padding: 5px;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
    }

    #result {
      margin-top: 20px;
      font-size: 1.1em;
    }

    #math {
      margin-top: 20px;
      white-space: pre-line;
      background: #f4f4f4;
      padding: 10px;
    }
  </style>
</head>

<body>

  <h2>VA Disability Combined Rating Calculator</h2>

  <p>Enter each disability rating (e.g., 10, 30, 50). Leave unused boxes empty.</p>

  <div id="ratings">
    <input type="number" placeholder="Rating 1">
    <input type="number" placeholder="Rating 2">
    <input type="number" placeholder="Rating 3">
    <input type="number" placeholder="Rating 4">
    <input type="number" placeholder="Rating 5">
    <input type="number" placeholder="Rating 6">
    <input type="number" placeholder="Rating 7">
    <input type="number" placeholder="Rating 8">
    <input type="number" placeholder="Rating 9">
    <input type="number" placeholder="Rating 10">
    <input type="number" placeholder="Rating 11">
    <input type="number" placeholder="Rating 12">
  </div>

  <button onclick="calculateVA()">Calculate</button>

  <div id="result"></div>
  <div id="math"></div>

  <script>
    // Round to nearest 10 like VA
    function roundToNearest10(value) {
      let v = Math.round(value);
      let rem = v % 10;
      return rem >= 5 ? v + (10 - rem) : v - rem;
    }

    function calculateVA() {
      let inputs = document.querySelectorAll("#ratings input");
      let ratings = [];

      inputs.forEach(i => {
        if (i.value !== "") ratings.push(parseInt(i.value));
      });

      if (ratings.length === 0) {
        document.getElementById("result").innerHTML = "Enter at least one rating.";
        return;
      }

      ratings.sort((a, b) => b - a);

      let combined = 0;
      let remaining = 100;
      let mathSteps = "--- Example of the Math ---\n";

      ratings.forEach(r => {
        let added = remaining * (r / 100);
        mathSteps += `Applying ${r}% to remaining ${remaining.toFixed(1)}% adds: ${added.toFixed(1)}%\n`;
        combined += added;
        remaining = 100 - combined;
      });

      let finalCombined = roundToNearest10(combined);
      let neededFor100 = combined >= 95 ? 0 : (95 - combined);

      document.getElementById("result").innerHTML =
        `<strong>True Rating:</strong> ${combined.toFixed(1)}%<br>
         <strong>VA Rating:</strong> ${finalCombined}%<br>
         <strong>Remaining % Needed for 100%:</strong> ${neededFor100.toFixed(1)}%`;

      document.getElementById("math").innerText = mathSteps;
    }
  </script>

  <a href="https://www.va.gov/disability/compensation-rates/veteran-rates/" class="_blank">
    <button> Rating Payment </button>
    <div class="header-area">

  </a>
  </div>

</body>

</html>
