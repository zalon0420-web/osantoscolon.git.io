<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <style>
        body {
            background-color: rgb(0, 228, 152);
            margin: 0;
            font-family: Arial, sans-serif;
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: auto auto auto;
            grid-template-areas:
                "header"
                "main-buttons"
                "footer-buttons";
            justify-items: center;
            padding-top: 40px;
        }

        .header-area {
            grid-area: header;
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .header-area img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
        }

        h1 {
            text-transform: capitalize;
            color: black;
            margin: 0;
        }


        button {
            background-color: black;
            color: white;
            border: none;
            height: 100px;
            width: 100px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;

            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .main-buttons {
            grid-area: main-buttons;
            margin-top: 30px;
        }


        .footer-buttons {
            grid-area: footer-buttons;
            margin-top: 20px;
        }
    </style>
</head>

<body>


    <div class="header-area">
        <img src="images/Profile.jpg" alt="Profile picture">
        <h1>
            Omar SantosColón<br>
            Project<br>
            Final Project
        </h1>
    </div>


    <div class="main-buttons">
        <a href="VA.html">
            <button>VA CALC</button>
        </a>
    </div>


    <div class="footer-buttons">
        <a href="index.html">
            <button>JCC Class Page</button>
        </a>
    </div>

</body>

</html>
