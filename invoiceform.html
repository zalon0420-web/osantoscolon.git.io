<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Customer Order Form</title>

  <style>
    body {
      background-color: white;
      font-family: "Times New Roman", serif;
    }

    h1 {
      text-align: center;
      color: purple;
    }

    table {
      border-collapse: collapse;
      margin: auto;
      width: 650px;
      background-color: white;
    }

    td,
    th {
      border: 2px solid #4a64b7;
      padding: 6px;
    }

    .header {
      font-weight: bold;
    }

    .blackbar {
      background-color: black;
      height: 25px;
    }

    .right {
      text-align: right;
    }

    .return-container {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }
  </style>

</head>

<body>

  <h1>Customer Order Form</h1>

  <table>

    <tr>
      <td colspan="4">Order Number</td>
    </tr>

    <tr>
      <td colspan="4">Order Date</td>
    </tr>

    <tr class="header">
      <td>Product Name</td>
      <td>Color</td>
      <td>Quantity</td>
      <td>Price</td>
    </tr>

    <tr>
      <td>&nbsp;</td>
      <td></td>
      <td></td>
      <td></td>
    </tr>

    <tr>
      <td>&nbsp;</td>
      <td></td>
      <td></td>
      <td></td>
    </tr>

    <tr>
      <td>&nbsp;</td>
      <td></td>
      <td></td>
      <td></td>
    </tr>

    <tr>
      <td>&nbsp;</td>
      <td></td>
      <td></td>
      <td></td>
    </tr>

    <tr class="blackbar">
      <td colspan="4"></td>
    </tr>

    <tr>
      <td colspan="4">Subtotal</td>
    </tr>

    <tr>
      <td colspan="4">Tax</td>
    </tr>

    <tr>
      <td colspan="3">Shipping</td>
      <td>5.95</td>
    </tr>

    <tr>
      <td colspan="4">Total</td>
    </tr>

  </table>


  <div class="return-container">
    <a href="index.html">
      <button>JCC Main Page</button>
    </a>

</body>

</html>
