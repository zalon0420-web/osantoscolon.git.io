<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>USDA Food Pyramid</title>

  <style>
    body {
      background-color: #ffffff;
      font-family: "Times New Roman", serif;
      text-align: center;
    }

    h1 {
      font-weight: normal;
      margin-bottom: 20px;
    }

    table {
      margin: auto;
      border-collapse: collapse;
      width: 430px;
      background-color: white;
    }

    th,
    td {
      border: 1px solid black;
      padding: 12px;
    }

    th {
      background-color: #177a3f;
      color: white;
    }

    .header-empty {
      background-color: #177a3f;
    }

    .food-group {
      text-align: left;
      font-weight: bold;
    }

    .food-group span {
      font-style: italic;
      font-weight: normal;
    }
  </style>
</head>

<body>

  <h1>USDA Food Pyramid</h1>

  <table>

    <tr>
      <th class="header-empty"></th>
      <th colspan="2">Serving Guidelines</th>
    </tr>

    <tr>
      <th>Food Group</th>
      <th>2005-2010</th>
      <th>2011–present</th>
    </tr>

    <tr>
      <td class="food-group">
        Dairy <br>
        <span>(milk, yogurt, cheese)</span>
      </td>
      <td>2-3</td>
      <td>3-4</td>
    </tr>

    <tr>
      <td class="food-group">
        Meat and Beans <br>
        <span>(beef, poultry, fish, beans)</span>
      </td>
      <td>2-3</td>
      <td>5-6</td>
    </tr>

    <tr>
      <td class="food-group">Fruits</td>
      <td>2-4</td>
      <td>2-4</td>
    </tr>

    <tr>
      <td class="food-group">Vegetables</td>
      <td>3-5</td>
      <td>1-2</td>
    </tr>

    <tr>
      <td class="food-group">
        Grains <br>
        <span>(bread, donuts, pop tarts)</span>
      </td>
      <td>1-2</td>
      <td>3-5</td>
    </tr>

  </table>

  <br>
  <br>
  <a href="index.html" class="button">
    <button> Return to Main </button>
</body>

</html>
